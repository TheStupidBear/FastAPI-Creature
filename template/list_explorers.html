{% extends 'main.html' %}

{% block content %}

 <table bgcolor="#dddddd">
 	<tr>
 		<th colspan=2>Explorers</th>
 	</tr>
 	<tr>
 		<th>Name</th>
 		<th>Country</th>
 		<th>Description</th>
 	</tr>
 	{% for explorer in explorers: %}
 	<tr>
 		<td>{{ explorer.name }}</td>
 		<td>{{ explorer.country }}</td>
 		<td>{{ explorer.description }}</td>
 	</tr>
 	{% endfor %}
 </table>
{% endblock %}
