{% extends 'main.html' %}

{% block content %}
<table bgcolor="#eeeeee">
 	<tr>
 		<th colspan=3>Creatures</th>
 	</tr>
 	<tr>
 		<th>Name</th>
 		<th>Description</th>
 		<th>Country</th>
 		<th>Area</th>
 		<th>AKA</th>
 	</tr>
 	{% for creature in creatures: %}
 	<tr>
 		<td>{{ creature.name }}</td>
 		<td>{{ creature.description }}</td>
 		<td>{{ creature.country }}</td>
 		<td>{{ creature.area }}</td>
 		<td>{{ creature.aka }}</td>
 	</tr>
 	{% endfor %}
 </table>
{% endblock %}
